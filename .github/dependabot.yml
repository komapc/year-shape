version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/year-shape-calendar"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Group low-risk updates so we don't get a flood of single-package PRs.
    groups:
      dev-dependencies:
        dependency-type: "development"
        update-types:
          - "minor"
          - "patch"
      production-dependencies:
        dependency-type: "production"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
